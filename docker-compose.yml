version: '3.9'
services:
  postgres:
    image: postgres:15
    container_name: flowdesk-postgres
    environment:
      POSTGRES_DB: flowdesk
      POSTGRES_USER: flowdesk
      POSTGRES_PASSWORD: flowdesk_dev
    ports:
      - "5432:5432"
  redis:
    image: redis:7-alpine
    container_name: flowdesk-redis
    ports:
      - "6379:6379"